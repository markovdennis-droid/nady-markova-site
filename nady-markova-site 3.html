<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nadia Markova Makeup</title>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,700;0,6..96,900;1,6..96,400&family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#c9a96e;--gold-light:#dfc89a;--cream:#f5ece0;--dark:#0a0a0a}
html,body{height:100%;overflow:hidden}
body{font-family:'Cormorant Garamond',Georgia,serif;background:var(--dark);color:var(--cream)}

.page{position:relative;width:100%;height:100vh;overflow:hidden;display:flex;align-items:flex-end}
.page__photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:50% 15%;filter:brightness(.5) contrast(1.1)}
.page__overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,10,10,.25) 0%,rgba(10,10,10,.05) 30%,rgba(10,10,10,.55) 70%,rgba(10,10,10,.92) 100%),linear-gradient(90deg,rgba(10,10,10,.55) 0%,transparent 55%);pointer-events:none}

.content{position:relative;z-index:2;padding:0 6vw 5vh;max-width:700px}
.title{font-family:'Bodoni Moda','Didot',Georgia,serif;font-weight:900;font-size:clamp(3rem,9vw,7.5rem);line-height:.9;color:#fff;text-shadow:0 2px 40px rgba(0,0,0,.5);margin-bottom:1.2rem}
.title span{display:block}
.title em{font-style:italic;font-weight:400}
.gold-line{width:50px;height:1px;background:linear-gradient(90deg,var(--gold),var(--gold-light),var(--gold));margin-bottom:1rem;opacity:0;animation:lineIn 1.2s ease 1s forwards}
@keyframes lineIn{to{opacity:1;width:70px}}
.subtitle{font-weight:300;font-size:clamp(.85rem,1.4vw,1.05rem);letter-spacing:.35em;text-transform:uppercase;color:var(--gold);margin-bottom:.9rem}
.about{font-weight:300;font-size:clamp(1.05rem,1.4vw,1.2rem);line-height:1.7;color:rgba(245,236,224,.65);max-width:460px;margin-bottom:.7rem}
.services{font-weight:400;font-size:clamp(1rem,1.2vw,1.1rem);letter-spacing:.2em;color:var(--gold);opacity:.7}

.nav{position:fixed;top:0;right:0;z-index:100;padding:1.5rem 4vw}
.lang-switcher{display:flex;gap:.2rem;background:rgba(255,255,255,.08);border-radius:100px;padding:.25rem}
.lang-btn{background:none;border:none;color:rgba(245,236,224,.5);font-family:'Cormorant Garamond',serif;font-size:.75rem;font-weight:500;letter-spacing:.1em;padding:.3rem .6rem;border-radius:100px;cursor:pointer;transition:all .3s;text-transform:uppercase}
.lang-btn.active{background:var(--gold);color:var(--dark)}
.lang-btn:hover:not(.active){color:var(--cream)}

.float-btns{position:fixed;bottom:2rem;right:2rem;z-index:100;display:flex;flex-direction:column;gap:.7rem}
.float-btn{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;text-decoration:none;transition:transform .3s,box-shadow .3s}
.float-btn:hover{transform:scale(1.12)}
.float-btn svg{width:25px;height:25px;fill:#fff}
.float-btn--wa{background:#25d366;box-shadow:0 4px 20px rgba(37,211,102,.4)}
.float-btn--ig{background:linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);box-shadow:0 4px 20px rgba(225,48,108,.3)}

.fade-up{opacity:0;transform:translateY(25px);animation:fadeUp .9s ease forwards}
.fade-up:nth-child(1){animation-delay:.3s}
.fade-up:nth-child(2){animation-delay:.5s}
.fade-up:nth-child(3){animation-delay:.7s}
.fade-up:nth-child(4){animation-delay:.9s}
.fade-up:nth-child(5){animation-delay:1.1s}
.fade-up:nth-child(6){animation-delay:1.3s}
@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}

.copy{position:absolute;bottom:1.2rem;left:6vw;z-index:2;font-size:.7rem;color:rgba(245,236,224,.2);letter-spacing:.1em}

@media(max-width:768px){
  .content{padding:0 5vw 4vh;padding-right:calc(5vw + 70px)}
  .float-btns{bottom:1.2rem;right:1.2rem;gap:.5rem}
  .float-btn{width:46px;height:46px}
  .float-btn svg{width:22px;height:22px}
}
</style>
</head>
<body>

<nav class="nav">
  <div class="lang-switcher">
    <button class="lang-btn active" data-lang="en">Eng</button>
    <button class="lang-btn" data-lang="es">Es</button>
    <button class="lang-btn" data-lang="ru">Rus</button>
  </div>
</nav>
